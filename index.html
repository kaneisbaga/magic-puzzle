<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法藥水排序：全能進化版</title>
    <style>
        :root {
            --bg: #f9f5f0;
            --text: #4a3121;
            --bottle-bg: #ffffff;
            --accent: #ff7043;
            --panel: rgba(255, 255, 255, 0.95);
            --shadow: rgba(0,0,0,0.08);
            --border-color: #5d4037;
        }

        [data-theme="dark"] {
            --bg: #2c3e50;
            --text: #ecf0f1;
            --bottle-bg: #34495e;
            --accent: #e67e22;
            --panel: rgba(44, 62, 80, 0.95);
            --shadow: rgba(0,0,0,0.4);
            --border-color: #ecf0f1;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s, color 0.3s; }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg); color: var(--text); 
            margin: 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* 介面與控制 */
        .header { padding: 20px 20px 5px; text-align: center; }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; align-items: center; }
        
        .theme-btn {
            position: fixed; top: 15px; left: 15px;
            padding: 8px 15px; border-radius: 20px; border: 2px solid var(--text);
            cursor: pointer; background: var(--panel); color: var(--text); font-weight: bold; z-index: 100;
        }

        /* 排行榜抽屜 */
        .leaderboard-btn {
            position: fixed; top: 15px; right: 15px;
            padding: 8px 15px; border-radius: 20px; border: 2px solid var(--text);
            cursor: pointer; background: var(--panel); color: var(--text); font-weight: bold; z-index: 100;
        }
        .drawer {
            position: fixed; top: 0; right: -320px; width: 300px; height: 100%;
            background: var(--panel); box-shadow: -5px 0 15px var(--shadow);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200;
            padding: 20px; display: flex; flex-direction: column;
        }
        .drawer.open { right: 0; }
        .drawer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 190;
        }

        /* 遊戲區域 */
        .game-container {
            background: var(--panel); padding: 20px; border-radius: 30px;
            box-shadow: 0 10px 30px var(--shadow); width: 98%; max-width: 1100px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 核心修改：確保 9 瓶不換行 */
        .play-zone {
            display: flex; gap: 8px; justify-content: center; align-items: flex-end;
            min-height: 240px; width: 100%; padding: 10px 0;
            overflow-x: auto; /* 若螢幕真的太窄則允許橫向滾動而不換行 */
        }

        .bottle-slot {
            flex: 0 1 100px; /* 彈性縮放但基準為100px */
            max-width: 90px;
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
            transition: transform 0.2s;
        }

        /* 記號框 (Checkbox) */
        .check-box {
            width: 24px; height: 24px; border: 2px solid var(--border-color);
            border-radius: 6px; margin-bottom: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            background: var(--bottle-bg); transition: 0.2s;
        }
        .check-box.marked { background: #2ecc71; border-color: #2ecc71; color: white; }
        .check-box.marked::after { content: '✓'; font-weight: bold; font-size: 14px; }

        .bottle-body {
            width: 100%; aspect-ratio: 1/1.6; background: var(--bottle-bg);
            border: 4px solid var(--border-color); border-radius: 18px 18px 22px 22px;
            position: relative; overflow: hidden; box-shadow: 0 5px 15px var(--shadow);
        }

        .liquid {
            position: absolute; bottom: 0; width: 100%; height: 85%;
            transition: background-color 0.5s; display: flex; align-items: center; justify-content: center;
        }
        .star { font-size: 24px; color: rgba(255,255,255,0.7); user-select: none; }

        /* 選中狀態 */
        .bottle-slot.selected { transform: translateY(-20px); }
        .bottle-slot.selected .bottle-body { border-color: var(--accent); }

        .secret-row { display: flex; gap: 8px; margin: 15px 0; }
        .ans-dot { width: 20px; height: 20px; border-radius: 50%; background: #bdc3c7; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; }

        .stats { display: flex; gap: 20px; font-weight: bold; margin-bottom: 10px; font-size: 1.1rem; }
        #win-msg { color: #27ae60; font-size: 1.5rem; font-weight: bold; display: none; margin: 10px 0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border-color); }
        .close-drawer { align-self: flex-end; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>

    <button class="theme-btn" onclick="toggleTheme()">🌓 模式</button>
    <button class="leaderboard-btn" onclick="toggleDrawer(true)">🏆 紀錄</button>

    <div class="drawer-overlay" id="overlay" onclick="toggleDrawer(false)"></div>
    <div class="drawer" id="drawer">
        <span class="close-drawer" onclick="toggleDrawer(false)">&times;</span>
        <h3>🏆 前 10 名排行</h3>
        <table id="leaderboard-table">
            <thead><tr><th>玩家</th><th>步數</th><th>瓶數</th></tr></thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
    </div>

    <div class="header">
        <h1>✨ 魔法藥水挑戰 ✨</h1>
    </div>

    <div class="game-container">
        <div class="controls">
            <input type="text" id="player-name" placeholder="輸入名稱" maxlength="8" style="padding:8px; width:100px; border-radius:10px; border:1px solid var(--border-color);">
            <select id="count-select" style="padding:8px; border-radius:10px;">
                <script>
                    for(let i=3; i<=9; i++) document.write(`<option value="${i}" ${i===5?'selected':''}>${i} 瓶模式</option>`);
                </script>
            </select>
            <button onclick="startGame()" style="padding:8px 15px; border-radius:10px; background:var(--accent); color:white; border:none; cursor:pointer; font-weight:bold;">開始遊戲</button>
        </div>

        <div id="win-msg">🎉 太棒了！完美排序！</div>

        <div class="stats">
            <div>步數：<span id="moves">0</span></div>
            <div>正確：<span id="correct" style="color:#27ae60;">0</span></div>
        </div>

        <div class="secret-row" id="secret-row"></div>
        <div class="play-zone" id="play-zone"></div>
        <div style="font-size: 12px; color: #999; margin-top: 10px;">小撇步：點擊瓶子上方的小框框可以做記號喔！</div>
    </div>

    <script>
        const COLORS = ['#FF4757', '#2ECC71', '#2980B9', '#F1C40F', '#9B59B6', '#E67E22', '#1ABC9C', '#E84393', '#D35400'];
        let state = {
            secret: [],
            current: [],
            marks: [], // 記錄哪些被勾選了
            selectedIndex: null,
            moves: 0,
            isWin: false
        };

        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        }

        function toggleDrawer(show) {
            document.getElementById('drawer').classList.toggle('open', show);
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
            if(show) updateLeaderboardDisplay();
        }

        function startGame() {
            const count = parseInt(document.getElementById('count-select').value);
            state.moves = 0;
            state.selectedIndex = null;
            state.isWin = false;
            state.marks = new Array(count).fill(false);
            document.getElementById('win-msg').style.display = 'none';
            document.getElementById('moves').innerText = '0';

            let pool = [...COLORS].sort(() => Math.random() - 0.5);
            state.secret = pool.slice(0, count);
            
            state.current = [...state.secret];
            while (JSON.stringify(state.current) === JSON.stringify(state.secret)) {
                state.current.sort(() => Math.random() - 0.5);
            }

            renderSecret();
            renderPlayZone();
            checkStatus();
        }

        function renderSecret() {
            const row = document.getElementById('secret-row');
            row.innerHTML = '';
            state.secret.forEach(() => {
                const dot = document.createElement('div');
                dot.className = 'ans-dot';
                dot.innerText = '?';
                row.appendChild(dot);
            });
        }

        function renderPlayZone() {
            const zone = document.getElementById('play-zone');
            zone.innerHTML = '';
            
            state.current.forEach((color, index) => {
                const slot = document.createElement('div');
                slot.className = `bottle-slot ${state.selectedIndex === index ? 'selected' : ''}`;
                
                // 點擊瓶身交換
                slot.onclick = () => handleSelect(index);

                // 點擊記號框
                const checkBox = document.createElement('div');
                checkBox.className = `check-box ${state.marks[index] ? 'marked' : ''}`;
                checkBox.onclick = (e) => {
                    e.stopPropagation(); // 防止觸發交換
                    state.marks[index] = !state.marks[index];
                    renderPlayZone();
                };

                slot.innerHTML = `
                    <div class="bottle-body">
                        <div class="liquid" style="background-color: ${color}">
                            <span class="star">★</span>
                        </div>
                    </div>
                `;
                slot.prepend(checkBox); // 將框框放在瓶子上方
                zone.appendChild(slot);
            });
        }

        function handleSelect(index) {
            if (state.isWin) return;
            if (state.selectedIndex === null) {
                state.selectedIndex = index;
            } else if (state.selectedIndex === index) {
                state.selectedIndex = null;
            } else {
                // 交換顏色與標記狀態
                const tempColor = state.current[state.selectedIndex];
                state.current[state.selectedIndex] = state.current[index];
                state.current[index] = tempColor;

                const tempMark = state.marks[state.selectedIndex];
                state.marks[state.selectedIndex] = state.marks[index];
                state.marks[index] = tempMark;

                state.selectedIndex = null;
                state.moves++;
                document.getElementById('moves').innerText = state.moves;
            }
            renderPlayZone();
            checkStatus();
        }

        function checkStatus() {
            let correct = 0;
            state.current.forEach((color, i) => {
                if (color === state.secret[i]) correct++;
            });
            document.getElementById('correct').innerText = correct;

            if (correct === state.secret.length && !state.isWin) {
                state.isWin = true;
                document.getElementById('win-msg').style.display = 'block';
                const dots = document.querySelectorAll('.ans-dot');
                state.secret.forEach((color, i) => {
                    dots[i].style.backgroundColor = color;
                    dots[i].innerText = '';
                });
                saveScore();
            }
        }

        function saveScore() {
            const name = document.getElementById('player-name').value || "訪客";
            const scores = JSON.parse(localStorage.getItem('magic_potion_scores') || '[]');
            scores.push({ name, moves: state.moves, count: state.secret.length });
            scores.sort((a, b) => a.moves - b.moves);
            localStorage.setItem('magic_potion_scores', JSON.stringify(scores.slice(0, 10)));
        }

        function updateLeaderboardDisplay() {
            const scores = JSON.parse(localStorage.getItem('magic_potion_scores') || '[]');
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = scores.map(s => `
                <tr><td>${s.name}</td><td>${s.moves}</td><td>${s.count}瓶</td></tr>
            `).join('') || '<tr><td colspan="3">尚無資料</td></tr>';
        }

        startGame();
    </script>
</body>
</html>
